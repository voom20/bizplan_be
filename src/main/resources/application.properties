# ==========================================
# Application Configuration
# ==========================================
spring.application.name=bizplan_be
server.port=8080

# ==========================================
# Database Configuration (H2 for Development)
# ==========================================
spring.datasource.url=jdbc:h2:mem:bizplan_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Flyway가 스키마를 관리하므로 ddl-auto=none 설정
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Flyway Migration
# ==========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ==========================================
# API Documentation (SpringDoc)
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ==========================================
# Security Configuration
# ==========================================
# AES-256 암호화 키 (Base64 인코딩된 32바이트)
# 개발환경: 기본값 사용 (운영환경에서는 환경변수로 설정 필수)
# 운영환경: app.security.encryption-key=${ENCRYPTION_KEY}
app.security.encryption-key=Yml6cGxhbl9lbmNyeXB0aW9uX2tleV8zMmJ5dGVzISE=

# ==========================================
# Actuator & Prometheus (Monitoring)
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# Prometheus endpoint 경로
management.prometheus.metrics.export.enabled=true

# ==========================================
# AI Engine Configuration
# ==========================================
ai.engine.url=${AI_ENGINE_URL:http://localhost:8000}
ai.engine.timeout=60

# ==========================================
# Logging
# ==========================================
logging.level.com.vibe.bizplan=DEBUG
logging.level.org.hibernate.SQL=DEBUG
